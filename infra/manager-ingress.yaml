apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: manager-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - host: cyclops.info
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cyclops-service
                port:
                  number: 8088
