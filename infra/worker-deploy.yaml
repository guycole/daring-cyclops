---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker-container
        image: daring-cyclops-worker:1
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 6379
